services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lebanese_math
      POSTGRES_USER: postgres
      # Dev-mode exception: DB password in compose is accepted for local dev only.
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-seed:
    image: hashicorp/vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      # Override these with real values before deploying outside dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder-set-real-key}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-placeholder-set-real-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      ELEVEN_LABS_API_KEY: ${ELEVEN_LABS_API_KEY:-placeholder-set-real-key}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESET_PASSWORD_FROM_EMAIL: ${RESET_PASSWORD_FROM_EMAIL:-onboarding@resend.dev}
      RESET_PASSWORD_TOKEN_SECRET: ${RESET_PASSWORD_TOKEN_SECRET:-dev-reset-password-secret-change-in-prod}
      # Same dev key pair the langfuse service self-provisions via LANGFUSE_INIT_*
      # below — keeps the API pre-authenticated against self-hosted Langfuse with
      # no manual "create API key in the UI" step.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev0000-0000-0000-0000-000000000000}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev0000-0000-0000-0000-000000000000}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/seed_vault.sh"]
    depends_on:
      vault:
        condition: service_healthy
    restart: on-failure

  langfuse-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfusepassword
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Self-hosted Langfuse (prompt management + LLM observability).
  # Pinned to the v2 major tag deliberately: v3 self-host additionally requires
  # ClickHouse + Redis + S3-compatible storage, which this dev stack does not
  # provision. Do not bump to :latest without adding those services too.
  langfuse:
    image: langfuse/langfuse:2
    restart: always
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      # Without this, Next.js standalone binds to Docker's auto-set HOSTNAME
      # (the container's bridge IP) instead of all interfaces — the published
      # port still works from the host, but loopback-based healthchecks
      # (and `wget localhost` from inside the container) get connection refused.
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://langfuse:langfusepassword@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-langfuse-nextauth-secret-change-in-prod}
      SALT: ${LANGFUSE_SALT:-dev-langfuse-salt-change-in-prod}
      NEXTAUTH_URL: http://localhost:3001
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # Headless init: pre-provisions an org/project/user and, critically, an
      # API key pair matching LANGFUSE_PUBLIC_KEY/SECRET_KEY above — so the app
      # is traced from the very first `docker compose up`, no UI step required.
      LANGFUSE_INIT_ORG_ID: tafawwaq-org
      LANGFUSE_INIT_ORG_NAME: Tafawwaq
      LANGFUSE_INIT_PROJECT_ID: tafawwaq-project
      LANGFUSE_INIT_PROJECT_NAME: Tafawwaq
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev0000-0000-0000-0000-000000000000}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev0000-0000-0000-0000-000000000000}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@tafawwaq.dev}
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-dev-langfuse-admin-change-in-prod}
    healthcheck:
      # 127.0.0.1, not localhost: this minimal image resolves "localhost" to
      # ::1 first, and the server isn't bound dual-stack.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:devpassword@db:5432/lebanese_math
    depends_on:
      db:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
    restart: on-failure

  guardrails:
    build:
      context: ./guardrails-service
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder-set-real-key}
      NEMOGUARDRAILS_LLM_FRAMEWORK: langchain
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Docker-internal Vault address — overrides VAULT_ADDR from env_file
      VAULT_ADDR: http://vault:8200
      GUARDRAILS_URL: http://guardrails:8100
      # Not a secret — just service discovery, same treatment as GUARDRAILS_URL.
      # Public/secret keys are Vault-sourced (see AppSecrets.langfuse_*).
      LANGFUSE_HOST: http://langfuse:3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      guardrails:
        condition: service_healthy
      langfuse:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      api:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  db_data:
  redis_data:
  minio_data:
  pgadmin_data:
  langfuse_db_data:
