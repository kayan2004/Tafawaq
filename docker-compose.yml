services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lebanese_math
      POSTGRES_USER: postgres
      # Dev-mode exception: DB password in compose is accepted for local dev only.
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault-seed:
    image: hashicorp/vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      # Override these with real values before deploying outside dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder-set-real-key}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-placeholder-set-real-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/seed_vault.sh"]
    depends_on:
      vault:
        condition: service_healthy
    restart: on-failure

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:devpassword@db:5432/lebanese_math
    depends_on:
      db:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
    restart: on-failure

  guardrails:
    build:
      context: ./guardrails-service
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder-set-real-key}
      NEMOGUARDRAILS_LLM_FRAMEWORK: langchain
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Docker-internal Vault address — overrides VAULT_ADDR from env_file
      VAULT_ADDR: http://vault:8200
      GUARDRAILS_URL: http://guardrails:8100
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      guardrails:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  db_data:
  redis_data:
  minio_data:
  pgadmin_data:
